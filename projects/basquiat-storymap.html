
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Basquiat StoryMap</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{
    --accent: #021A54;
    --inactive: #BDA6CE;
    --bg: #f6f4ef;
    --text: #111;
    --muted: rgba(17,17,17,0.58);
    --card: rgba(255,255,255,0.88);
    --line: rgba(2,26,84,0.18);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    scroll-behavior: smooth;
  }

  #app {
    position: relative;
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #map {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    z-index: 1;
  }

  .fog {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background:
      linear-gradient(to right, rgba(246,244,239,0.38) 0%, rgba(246,244,239,0.08) 25%, rgba(246,244,239,0.04) 70%, rgba(246,244,239,0.14) 100%);
  }

  #story {
    position: relative;
    z-index: 3;
    width: min(38vw, 560px);
    margin-left: 5vw;
    padding-top: 8vh;
    padding-bottom: 10vh;
  }

  .step {
    min-height: 92vh;
    display: flex;
    align-items: center;
    padding: 5vh 0;
    opacity: 0.46;
    transition: opacity 0.4s ease;
  }

  .step.active {
    opacity: 1;
  }

  .card {
    width: 100%;
    background: var(--card);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(2,26,84,0.08);
    border-radius: 22px;
    padding: 24px 24px 20px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: 700;
  }

  .title {
    font-size: clamp(28px, 3vw, 44px);
    line-height: 1.04;
    letter-spacing: -0.03em;
    margin: 0 0 14px 0;
    color: #0d1633;
  }

  .text {
    font-size: 16px;
    line-height: 1.62;
    color: rgba(17,17,17,0.88);
    white-space: pre-line;
  }

  .img-frame {
    margin-top: 18px;
    padding: 10px;
    background: #fff;
    border: 1px solid rgba(2,26,84,0.10);
    border-radius: 18px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.10);
  }

  .img-frame img {
    width: 100%;
    display: block;
    border-radius: 12px;
    object-fit: cover;
    max-height: 320px;
  }

  #timeline {
    position: fixed;
    right: 2.4vw;
    top: 5vh;
    width: min(18vw, 270px);
    height: 90vh;
    z-index: 4;
    padding: 16px 12px 16px 18px;
    border-left: 1px solid rgba(2,26,84,0.18);
    overflow: visible;
    pointer-events: none;
  }

  #timeline .timeline-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(2,26,84,0.8);
    font-weight: 700;
    margin-bottom: 14px;
  }

  #timeline-list {
    position: relative;
    height: calc(100% - 28px);
    overflow-y: auto;
    overflow-x: visible;
    padding-left: 12px;
    padding-right: 6px;
    scrollbar-width: none;
  }

  #timeline-list::-webkit-scrollbar {
    display: none;
  }

  .tl-item {
    position: relative;
    padding: 6px 0 10px 24px;
    transition: transform 0.35s ease, opacity 0.35s ease;
    opacity: 0.52;
  }

  .tl-item::before {
    content: "";
    position: absolute;
    left: 0px;
    top: 12px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--inactive);
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px rgba(2,26,84,0.10);
    transition: all 0.35s ease;
  }

  .tl-item.current {
    opacity: 1;
    transform: translateX(-4px);
  }

  .tl-item.current::before {
    background: var(--accent);
    width: 14px;
    height: 14px;
    left: -1px;
    top: 11px;
    box-shadow: 0 0 0 4px rgba(2,26,84,0.12);
  }

  .tl-item.past {
    opacity: 0.82;
  }

  .tl-item.past::before {
    background: var(--accent);
  }

  .tl-year {
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: rgba(2,26,84,0.72);
    font-weight: 700;
    margin-bottom: 2px;
  }

  .tl-label {
    font-size: 13px;
    line-height: 1.35;
    color: rgba(17,17,17,0.86);
  }

  .mapboxgl-popup {
    display: none !important;
  }

  .maplibregl-ctrl-top-left,
  .maplibregl-ctrl-top-right,
  .maplibregl-ctrl-bottom-left,
  .mapboxgl-ctrl-top-left,
  .mapboxgl-ctrl-top-right,
  .mapboxgl-ctrl-bottom-left {
    display: none !important;
  }

  .maplibregl-ctrl-attribution,
  .mapboxgl-ctrl-attribution {
    font-size: 10px;
    background: rgba(255,255,255,0.6) !important;
  }

  @media (max-width: 1100px) {
    #story {
      width: min(54vw, 620px);
      margin-left: 4vw;
    }
    #timeline {
      width: 220px;
      right: 8px;
    }
  }

  @media (max-width: 820px) {
    .fog { display: none; }
    #story {
      width: calc(100vw - 24px);
      margin-left: 12px;
      margin-right: 12px;
      padding-top: 4vh;
    }
    #timeline {
      display: none;
    }
    .step { min-height: 84vh; }
    .card { padding: 18px; border-radius: 18px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <div class="fog"></div>

  <aside id="timeline">
    <div class="timeline-title">Timeline</div>
    <div id="timeline-list"></div>
  </aside>

  <main id="story"></main>
</div>

const sections = [{"id": "assignment-note", "eyebrow": "Assignment Note", "title": "Why Basquiat, why New York", "text": "For the assignment Python Basics for Spatial Analysis and Visualization, I decided to assemble a dataset of Jean-Michel Basquiat’s places in New York. Rather than mapping biography as a neutral chronology, this storymap uses spatial sequence to trace how artistic formation, mobility, subculture, race, and the city intersect. It also serves as a contextual prelude to my next assignment on SVI Semantic Segmentation of SoHo, helping situate that neighborhood within the wider cultural and urban worlds through which Basquiat moved.", "image": "", "focus_fids": [], "highlight_fids": [], "visible_until": 0, "camera": {"mode": "manual", "center": [-96.0, 39.5], "zoom": 2.15, "pitch": 18, "bearing": -6}, "show_nyc_boundary": false, "show_us_mask": false, "timeline_fid": 0}, {"id": "intro-globe", "eyebrow": "Prologue", "title": "North America", "text": "Before Basquiat becomes a singular name, he emerges within a longer geography of empire, migration, and racial ordering. North America is colonial space structured by extraction, displacement, and the violent production of modern identities. Basquiat’s life—born in Brooklyn to a Haitian father and a mother of Puerto Rican descent—belongs to this wider Atlantic history: one shaped by the afterlives of slavery, Caribbean movement, and the unequal cultural economies through which Black expression is alternately appropriated, marginalized, and fetishized. His work would later turn that condition into visual language: fractured, referential, insurgent, and impossible to contain within the polite boundaries of the art world.", "image": "", "focus_fids": [], "highlight_fids": [], "visible_until": 0, "camera": {"mode": "manual", "center": [-100.5, 42.2], "zoom": 2.35, "pitch": 22, "bearing": -8}, "show_nyc_boundary": false, "show_us_mask": false, "timeline_fid": 0}, {"id": "intro-nyc", "eyebrow": "Prelude", "title": "New York City", "text": "The map narrows to New York City at a moment when the metropolis was marked by contradiction. In the late 1960s and 1970s, fiscal crisis, disinvestment, infrastructural neglect, racial tension, and uneven urban governance reshaped everyday life. Yet the same city also generated new cultural languages from below: graffiti, punk, no wave, hip-hop, and downtown performance scenes took root in conditions of instability. This was the urban field in which Basquiat’s sensibility formed—not a polished cultural capital, but a city of rupture, improvisation, and dissent.", "image": "", "focus_fids": [], "highlight_fids": [], "visible_until": 0, "camera": {"mode": "manual", "center": [-74.006, 40.7128], "zoom": 8.55, "pitch": 25, "bearing": -10}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 0}, {"id": "intro-nyc-mask", "eyebrow": "Threshold", "title": "Entering the city", "text": "Within this fractured metropolis, Basquiat moved through museums, schools, apartments, streets, clubs, and studios that connected personal biography to broader urban upheaval. The story that follows is not only about an individual artist, but about the city as medium: its inequalities, subcultures, collisions, and counterpublics.", "image": "", "focus_fids": [], "highlight_fids": [], "visible_until": 0, "camera": {"mode": "manual", "center": [-74.006, 40.7128], "zoom": 9.2, "pitch": 30, "bearing": -10}, "show_nyc_boundary": true, "show_us_mask": true, "timeline_fid": 0}, {"id": "s1-1", "eyebrow": "Chapter 1 · Childhood", "title": "Park Slope", "text": "Jean-Michel Basquiat was born on December 22, 1960, in Park Slope to Gerard and Matilde Basquiat. His father was born in Haiti while his mother was born to Puerto Rican parents in Brooklyn.", "image": "https://scontent-ams2-1.xx.fbcdn.net/v/t39.30808-6/526754452_1130855062217435_2961702080551087557_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=e06c5d&_nc_ohc=WHH32x1guXoQ7kNvwEwT2dc&_nc_oc=AdrvNXOP6KeLosuo1PBbPn4ezL9Ow7AEttNqF36zn6t3JuBJzgGj-uFxV6zJSoCL56I&_nc_zt=23&_nc_ht=scontent-ams2-1.xx&_nc_gid=pRcsZz9otZZ0j8I50HxX2Q&_nc_ss=7a3a8&oh=00_Af0dxhzK5WfZnrl94LMWa4EAXZZDfIxgG4qAKKHU6Xld_Q&oe=69DACB32", "focus_fids": [1, 2, 3, 4], "highlight_fids": [1], "visible_until": 4, "camera": {"mode": "fit", "padding": {"top": 100, "bottom": 100, "left": 120, "right": 420}, "maxZoom": 11.7}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 1}, {"id": "s1-2", "eyebrow": "Chapter 1 · Childhood", "title": "East Flatbush", "text": "In 1966, he moved to East 35th Street in East Flatbush, where Basquiat began studying and practicing art, attending the nearby Saint Ann’s School and drawing his favorite cartoons.", "image": "https://thumbs.6sqft.com/wp-content/uploads/2015/01/21011858/NYPL_Dinanda_Nooney-Basquiat.jpg?w=1560&format=webp", "focus_fids": [1, 2, 3, 4], "highlight_fids": [2], "visible_until": 4, "camera": {"mode": "fit", "padding": {"top": 100, "bottom": 100, "left": 120, "right": 420}, "maxZoom": 11.7}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 2}, {"id": "s1-3", "eyebrow": "Chapter 1 · Childhood", "title": "Saint Ann’s School", "text": "It was at the East Flatbush home that he recovered from an automobile accident in 1968, in which he broke his arm and had his spleen removed. His mother gave him a copy of Gray’s Anatomy, which had a lasting impression on him and was reflected in his later anatomical drawings.", "image": "https://cdn.sanity.io/images/dqllnil6/production/bfaef52a98f5efe0bd8921538d11e0e002af8c61-1200x1517.jpg", "focus_fids": [1, 2, 3, 4], "highlight_fids": [3], "visible_until": 4, "camera": {"mode": "fit", "padding": {"top": 100, "bottom": 100, "left": 120, "right": 420}, "maxZoom": 11.7}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 3}, {"id": "s1-4", "eyebrow": "Chapter 1 · Childhood", "title": "Boerum Hill", "text": "After his parents separated, he moved to Boerum Hill with his father and two siblings before moving to Puerto Rico three years later. He returned to Boerum Hill in 1976 and moved out in 1978 after creating the fictional character SAMO.", "image": "https://pyxis.nymag.com/v1/imgs/5d2/d3f/70ec03ecc89c9444ea06bb29fbe0fcdd44-basquiat-graffiti.rsquare.w700.jpg", "focus_fids": [1, 2, 3, 4], "highlight_fids": [4], "visible_until": 4, "camera": {"mode": "fit", "padding": {"top": 100, "bottom": 100, "left": 120, "right": 420}, "maxZoom": 11.7}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 4}, {"id": "s2-1", "eyebrow": "Chapter 2 · Museums", "title": "Brooklyn Museum, MoMA, and the Met", "text": "Basquiat’s mother enrolled him as a junior member of the Brooklyn Museum of Art when he was just a child. He also made frequent visits to the Museum of Modern Art and the Metropolitan Museum of Art starting in 1975. Little did he know that these visits would inspire him to pursue art professionally.", "image": "https://sothebys-com.brightspotcdn.com/dims4/default/c4c26be/2147483647/strip/true/crop/423x450+0+0/resize/684x728!/quality/90/?url=http%3A%2F%2Fsothebys-brightspot-migration.s3.amazonaws.com%2F11%2F22%2F0c%2Fb0cedd0b53ae816188a5715303bcf974caa63b5d5da2ebecf8684d2293%2Fonebasquiat-body1.jpg", "focus_fids": [5, 6, 7], "highlight_fids": [5], "visible_until": 7, "camera": {"mode": "fit", "padding": {"top": 100, "bottom": 100, "left": 120, "right": 420}, "maxZoom": 11.8}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 5}, {"id": "s2-2", "eyebrow": "Chapter 2 · Afterlife", "title": "Return to the museum", "text": "The museum put on a retrospective of his art in March 2005 nearly two decades after his 1988 death. The exhibition gathered together more than 100 of Basquiat’s finest works, including some never shown in the U.S. The sections highlighted Basquiat’s interests in music, language, and Afro-Caribbean imagery, as shown through collages, silkscreens, and graffiti. The museum later put on Basquiat: The Unknown Notebooks in 2015, as well as One Basquiat in 2018 that was the first museum presentation of his monumental work Untitled.", "image": "https://images.huffingtonpost.com/2015-04-01-1427849713-8225355-brooklynstreetartbasquiatbrooklynmuseumjaimerojo0415web4.jpg", "focus_fids": [5, 6, 7], "highlight_fids": [5], "visible_until": 7, "camera": {"mode": "fit", "padding": {"top": 100, "bottom": 100, "left": 120, "right": 420}, "maxZoom": 11.8}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 5}, {"id": "s3-1", "eyebrow": "Chapter 3 · School and collaboration", "title": "City-as-School High School", "text": "City-as-School High School at 16 Clarkson Street in the West Village is a public high school that focuses on experiential learning through work-study internships. Basquiat transferred to City-as-School in 1976 after just a short time at Edward R. Murrow High School. Basquiat met Al Diaz, a graffitist from the Jacob Riis Projects, at the high school, and they quickly became friends and artistic collaborators.", "image": "https://news.artnet.com/app/news-upload/2019/08/aldiazbasquiat_flintgennari%C2%A9.jpg", "focus_fids": [8], "highlight_fids": [8], "visible_until": 8, "camera": {"mode": "point", "fid": 8, "zoom": 13.7, "pitch": 42, "bearing": -18}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 8}, {"id": "s3-2", "eyebrow": "Chapter 3 · SAMO", "title": "Lower Manhattan", "text": "After they became friends, Basquiat created a fictional character named SAMO, short for Same Old Shit, and the duo spray painted references to SAMO throughout Lower Manhattan. SAMO received media attention due to its anti-establishment and anti-political message, as seen through poems throughout the city stating things like “SAMO AS AN END TO MINDWASH RELIGION, NOWHERE POLITICS, AND BOGUS PHILOSOPHY.”", "image": "https://images.squarespace-cdn.com/content/v1/5eca6d601a267019b81cfd61/8f49dd26-0f97-4144-b807-fc79ed0c4ad5/6b6e074be02100e336cb82b894a76ef4.jpg", "focus_fids": [8, 9, 11, 12, 16, 18], "highlight_fids": [8], "visible_until": 12, "camera": {"mode": "fit", "padding": {"top": 80, "bottom": 80, "left": 120, "right": 420}, "maxZoom": 13.2}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 8}, {"id": "s4-1", "eyebrow": "Chapter 4 · East Village beginnings", "title": "Canal Street and East 12th Street", "text": "In 1978, Basquiat and his girlfriend Alexis Adler moved into a small apartment at 527 East 12th Street. Before this, he stayed at a loft on Canal Street with Stan Peskett, a British artist.", "image": "", "focus_fids": [9, 10], "highlight_fids": [9, 10], "visible_until": 12, "camera": {"mode": "fit", "padding": {"top": 100, "bottom": 100, "left": 120, "right": 420}, "maxZoom": 14.0}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 9}, {"id": "s4-2", "eyebrow": "Chapter 4 · Networks", "title": "Mudd Club", "text": "The Mudd Club was more than a nightclub: it was one of downtown New York’s key social condensers, where post-punk music, performance, fashion, film, and visual art collided. For Basquiat, it offered access to a scene that defined itself against uptown polish and commercial respectability. In this unstable but fertile milieu, reputations circulated quickly, and the club became one of the places where he moved from street presence into a wider network of artists, musicians, and cultural intermediaries.", "image": "https://pbs.twimg.com/media/DWaqMAcX4AABj0G.jpg", "focus_fids": [11, 12], "highlight_fids": [11], "visible_until": 12, "camera": {"mode": "fit", "padding": {"top": 100, "bottom": 100, "left": 120, "right": 420}, "maxZoom": 14.0}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 11}, {"id": "s4-3", "eyebrow": "Chapter 4 · Downtown nightlife", "title": "Club 57", "text": "Located in the basement of a Polish church on St. Marks Place, Club 57 was one of the East Village’s most radical low-budget venues: improvised, camp, and defiantly anti-institutional. It incubated a culture of experimentation in which art, music, costume, film, and performance slipped into one another. Basquiat circulated within this downtown ecology alongside artists, musicians, and club figures who were inventing new forms precisely because they stood outside the city’s official cultural hierarchies.", "image": "https://2024.schirn.de/fileadmin/_processed_/csm_BBN_3126426_18c7513641.jpg", "focus_fids": [11, 12], "highlight_fids": [12], "visible_until": 12, "camera": {"mode": "fit", "padding": {"top": 100, "bottom": 100, "left": 120, "right": 420}, "maxZoom": 14.0}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 12}, {"id": "s5-1", "eyebrow": "Chapter 5 · Music and friends", "title": "School of Visual Arts", "text": "In May 1979, Basquiat formed a band called “Channel 9” and later “Gray,” with whom he played clarinet and synthesizer. While a part of “Gray,” he often visited the School of Visual Arts, and this is where he met his lifelong friends Keith Haring and Kenny Scharf. Haring was there for Basquiat during his periods of drug abuse, and the two often discussed the arts and graffiti scenes. After Basquiat’s death, Haring memorialized him with the painting A Pile of Crowns for Jean-Michel Basquiat.", "image": "https://glasstire.com/wp-content/uploads/2018/10/Gray.jpg", "focus_fids": [13], "highlight_fids": [13], "visible_until": 13, "camera": {"mode": "point", "fid": 13, "zoom": 14.0, "pitch": 44, "bearing": -16}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 13}, {"id": "s6-1", "eyebrow": "Chapter 6 · First public exhibition", "title": "Times Square Show", "text": "At The Times Square Show, Basquiat publicly exhibited his art for the first time. Groups called Colab (Collaborative Projects) on the Lower East Side and Fashion Moda in the South Bronx organized the show. Art critics and curators, including Jeffrey Deitch, took note of Basquiat’s art, catapulting him to fame in the New York arts community; a year later, he displayed some of his artworks in the New York/New Wave exhibition at MoMA PS1.", "image": "https://moma.org/d/assets/W1siZiIsIjIwMTcvMDMvMjgvOTAxdmpuY3Vha19JTlBTMV8yNzhfOV9SSUNSLmpwZyJdLFsicCIsImNvbnZlcnQiLCItcmVzaXplIDIwMDB4MjAwMFx1MDAzZSJdXQ/INPS1_278_9_RICR.jpg?sha=02eb7bbf9ff52edb", "focus_fids": [14], "highlight_fids": [14], "visible_until": 14, "camera": {"mode": "point", "fid": 14, "zoom": 13.9, "pitch": 44, "bearing": -14}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 14}, {"id": "s7-1", "eyebrow": "Chapter 7 · East 1st Street", "title": "68 East 1st Street", "text": "In January 1981, Basquiat moved to 68 East 1st Street with his girlfriend Suzanne Mallouk. While living at the new East Village apartment, he participated in the New York/New Wave exhibition, which featured works by Keith Haring, Robert Mapplethorpe, and Kenny Scharf. In May, Basquiat also traveled to Europe for the first time, showcasing 10 of his paintings at Galleria d’Arte Emilio Mazzoli in Modena. Annina Nosei, his primary dealer, invited him to use her basement as a studio, where he produced his art in addition to his new East Village apartment.", "image": "https://media.cntraveler.com/photos/551d85cc96bfd1f1482d7daf/master/w_1024%2Cc_limit/basquiat-photo-TsengKwongChi.jpg", "focus_fids": [15], "highlight_fids": [15], "visible_until": 15, "camera": {"mode": "point", "fid": 15, "zoom": 14.3, "pitch": 44, "bearing": -18}, "show_nyc_boundary": true, "show_us_mask": false, "timeline_fid": 15}, {"id": "s8-1", "eyebrow": "Chapter 8 · SoHo", "title": "151 Crosby Street", "text": "After living at 68 East 1st Street for just a year, Basquiat and Mallouk moved to 151 Crosby Street. While living at the SoHo apartment, he put on his first solo U.S. exhibition at Annina Nosei’s gallery, including Untitled and Crowns (Peso Neto). Basquiat also displayed a number of his most famous paintings out in Los Angeles at the Larry Gagosian Gallery. After Bruno Bischofberger becam const timelineItems = [{"fid": 1, "scene": 1, "year": 1960, "caption": "Park Slope"}, {"fid": 2, "scene": 1, "year": 1966, "caption": "East Flatbush"}, {"fid": 3, "scene": 1, "year": 1966, "caption": "Saint Ann's School"}, {"fid": 4, "scene": 1, "year": 1970, "caption": "Boerum Hill"}, {"fid": 5, "scene": 2, "year": 1975, "caption": "Brooklyn Museum"}, {"fid": 6, "scene": 2, "year": 1975, "caption": "Museum of Modern Art (MoMA)"}, {"fid": 7, "scene": 2, "year": 1975, "caption": "Metropolitan Museum of Art"}, {"fid": 8, "scene": 3, "year": 1976, "caption": "City-as-School High School"}, {"fid": 9, "scene": 4, "year": 1978, "caption": "Canal Street"}, {"fid": 10, "scene": 4, "year": 1978, "caption": "527 East 12th Street"}, {"fid": 11, "scene": 4, "year": 1978, "caption": "Mudd Club "}, {"fid": 12, "scene": 4, "year": 1978, "caption": "Club 57"}, {"fid": 13, "scene": 5, "year": 1979, "caption": "School of Visual Arts"}, {"fid": 14, "scene": 6, "year": 1980, "caption": "Times Square"}, {"fid": 15, "scene": 7, "year": 1981, "caption": "68 East 1st Street"}, {"fid": 16, "scene": 8, "year": 1981, "caption": "151 Crosby Street"}, {"fid": 17, "scene": 9, "year": 1983, "caption": "Whitney Museum"}, {"fid": 18, "scene": 10, "year": 1983, "caption": "57 Great Jones Street"}, {"fid": 19, "scene": 11, "year": 1988, "caption": "Green-Wood Cemetery"}];

// MapLibre + OpenFreeMap need no access token

const storyEl = document.getElementById("story");
const timelineListEl = document.getElementById("timeline-list");

function buildStory() {
  sections.forEach((s, idx) => {
    const step = document.createElement("section");
    step.className = "step";
    step.id = s.id;
    step.dataset.index = idx;

    const img = s.image ? `
      <div class="img-frame">
        <img src="${s.image}" alt="${s.title}" loading="lazy" referrerpolicy="no-referrer">
      </div>
    ` : "";

    step.innerHTML = `
      <div class="card">
        <div class="eyebrow">${s.eyebrow || ""}</div>
        <h2 class="title">${s.title || ""}</h2>
        <div class="text">${s.text || ""}</div>
        ${img}
      </div>
    `;
    storyEl.appendChild(step);
  });
}

function buildTimeline() {
  timelineItems.forEach(item => {
    const el = document.createElement("div");
    el.className = "tl-item";
    el.id = `tl-${item.fid}`;
    el.innerHTML = `
      <div class="tl-year">${item.year}</div>
      <div class="tl-label">${item.caption}</div>
    `;
    timelineListEl.appendChild(el);
  });
}

buildStory();
buildTimeline();

const steps = [...document.querySelectorAll(".step")];

const map = new maplibregl.Map({
  container: "map",
  style: MAP_STYLE,
  center: [-100.5, 42.2],
  zoom: 2.35,
  pitch: 22,
  bearing: -8,
  interactive: false,
  attributionControl: {compact: true}
});

map.on("style.load", () => {
  // flat map — globe projection is Mapbox-only, not used in MapLibre

  try {
    map.setFog({
      range: [-1, 2],
      color: "rgb(255,255,255)",
      "high-color": "rgb(245,246,250)",
      "space-color": "rgb(230,235,243)",
      "star-intensity": 0.0
    });
  } catch (e) {}

  map.addSource("basquiat-points", {
    type: "geojson",
    data: pointsGeoJSON
  });

  map.addSource("nyc-boundary", {
    type: "geojson",
    data: nycBoundary
  });

  map.addSource("us-mask", {
    type: "geojson",
    data: usMask
  });

  map.addLayer({
    id: "us-mask-fill",
    type: "fill",
    source: "us-mask",
    paint: {
      "fill-color": "#ffffff",
      "fill-opacity": 0.0
    }
  });

  map.addLayer({
    id: "nyc-boundary-fill",
    type: "fill",
    source: "nyc-boundary",
    paint: {
      "fill-color": ACCENT,
      "fill-opacity": 0.0
    }
  });

  map.addLayer({
    id: "nyc-boundary-line",
    type: "line",
    source: "nyc-boundary",
    paint: {
      "line-color": ACCENT,
      "line-width": 2,
      "line-opacity": 0.0
    }
  });

  map.addLayer({
    id: "point-rings",
    type: "circle",
    source: "basquiat-points",
    filter: ["==", ["get", "visible"], true],
    paint: {
      "circle-radius": [
        "case",
        ["==", ["get", "active"], true], 13,
        9
      ],
      "circle-color": ["get", "currentColor"],
      "circle-stroke-color": "#ffffff",
      "circle-stroke-width": [
        "case",
        ["==", ["get", "active"], true], 2.5,
        1.2
      ],
      "circle-opacity": [
        "case",
        ["==", ["get", "active"], true], 1.0,
        0.96
      ]
    }
  });

  map.addLayer({
    id: "point-centers",
    type: "circle",
    source: "basquiat-points",
    filter: ["==", ["get", "visible"], true],
    paint: {
      "circle-radius": [
        "case",
        ["==", ["get", "active"], true], 4.2,
        2.6
      ],
      "circle-color": "#ffffff",
      "circle-opacity": 0.95
    }
  });

  map.addLayer({
    id: "point-labels",
    type: "symbol",
    source: "basquiat-points",
    filter: ["==", ["get", "visible"], true],
    layout: {
      "text-field": ["get", "caption"],
      "text-font": ["Noto Sans Regular"],
      "text-size": [
        "interpolate", ["linear"], ["zoom"],
        8, 10,
        12, 11,
        14, 12
      ],
      "text-offset": [0, 1.4],
      "text-anchor": "top",
      "text-allow-overlap": true
    },
    paint: {
      "text-color": "#0e1630",
      "text-halo-color": "rgba(255,255,255,0.95)",
      "text-halo-width": 1.2,
      "text-opacity": 0.98
    }
  });

  activateSection(0, true);
});

function getPoint(fid) {
  return pointsGeoJSON.features.find(f => Number(f.properties.fid) === Number(fid));
}

function getBoundsForFids(fids) {
  const pts = fids.map(fid => getPoint(fid)).filter(Boolean);
  if (!pts.length) return null;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  pts.forEach(f => {
    const [x, y] = f.geometry.coordinates;
    minX = Math.min(minX, x);
    minY = Math.min(minY, y);
    maxX = Math.max(maxX, x);
    maxY = Math.max(maxY, y);
  });

  return [[minX, minY], [maxX, maxY]];
}

function updatePointSource(section) {
  const visibleUntil = Number(section.visible_until || 0);
  const highlight = new Set((section.highlight_fids || []).map(Number));

  const next = JSON.parse(JSON.stringify(pointsGeoJSON));

  next.features = next.features.map(f => {
    const fid = Number(f.properties.fid);

    let visible = false;
    let currentColor = INACTIVE;
    let active = false;

    if (visibleUntil > 0 && fid <= visibleUntil) {
      visible = true;
      currentColor = f.properties.sceneColor;
    }

    if (visible && !highlight.has(fid)) {
      currentColor = INACTIVE;
    }

    if (highlight.has(fid)) {
      visible = true;
      active = true;
      currentColor = ACCENT;
    }

    f.properties.visible = visible;
    f.properties.active = active;
    f.properties.currentColor = currentColor;
    return f;
  });

  map.getSource("basquiat-points").setData(next);
}

function setBoundaryVisibility(showBoundary) {
  map.setPaintProperty("nyc-boundary-fill", "fill-opacity", showBoundary ? 0.09 : 0.0);
  map.setPaintProperty("nyc-boundary-line", "line-opacity", showBoundary ? 0.95 : 0.0);
}

function setMaskVisibility(showMask) {
  map.setPaintProperty("us-mask-fill", "fill-opacity", showMask ? 0.75 : 0.0);
}

function moveCamera(section, immediate=false) {
  const cam = section.camera || {};
  const duration = immediate ? 0 : 4200;

  if (cam.mode === "manual") {
    map.easeTo({
      center: cam.center,
      zoom: cam.zoom,
      pitch: cam.pitch || 0,
      bearing: cam.bearing || 0,
      duration,
      essential: true
    });
    return;
  }

  if (cam.mode === "point") {
    const p = getPoint(cam.fid);
    if (!p) return;

    map.easeTo({
      center: p.geometry.coordinates,
      zoom: cam.zoom || 14,
      pitch: cam.pitch || 40,
      bearing: cam.bearing || 0,
      duration,
      essential: true
    });
    return;
  }

  if (cam.mode === "fit") {
    const bounds = getBoundsForFids(section.focus_fids || []);
    if (!bounds) return;

    map.fitBounds(bounds, {
      padding: cam.padding || {top: 80, bottom: 80, left: 100, right: 380},
      maxZoom: cam.maxZoom || 13.8,
      duration,
      essential: true,
      pitch: 30,
      bearing: -10
    });
  }
}

function updateTimeline(currentFid) {
  timelineItems.forEach(item => {
    const el = document.getElementById(`tl-${item.fid}`);
    if (!el) return;

    el.classList.remove("current", "past");

    if (currentFid === item.fid) {
      el.classList.add("current");
    } else if (currentFid > item.fid) {
      el.classList.add("past");
    }
  });

  const currentEl = document.getElementById(`tl-${currentFid}`);
  if (currentEl) {
    const parent = timelineListEl;
    const y = currentEl.offsetTop - parent.clientHeight * 0.32;
    parent.scrollTo({ top: Math.max(0, y), behavior: "smooth" });
  }
}

let activeIndex = -1;

function activateSection(index, immediate=false) {
  if (index < 0 || index >= sections.length || activeIndex === index) return;

  activeIndex = index;
  steps.forEach((s, i) => s.classList.toggle("active", i === index));

  const section = sections[index];
  updatePointSource(section);
  setBoundaryVisibility(!!section.show_nyc_boundary);
  setMaskVisibility(!!section.show_us_mask);
  moveCamera(section, immediate);
  updateTimeline(Number(section.timeline_fid || 0));
}

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting && entry.intersectionRatio > 0.55) {
      const idx = Number(entry.target.dataset.index);
      activateSection(idx);
    }
  });
}, { threshold: [0.55, 0.75] });

steps.forEach(step => observer.observe(step));
</script>
